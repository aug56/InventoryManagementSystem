# ===================================================================

# 1. THE CONNECTION URL (Combined Host, Port, and DB from your image)
# We add 'ssl-mode=REQUIRED' to match Aiven's security requirement.
spring.datasource.url=jdbc:mysql://mysql-394f430e-augustavemico56-6257.c.aivencloud.com:24482/defaultdb?ssl-mode=REQUIRED

# 2. CREDENTIALS (from your image)
spring.datasource.username=avnadmin
spring.datasource.password=AVNS_VD0bp-gAziQ9RwRMEqO

# 3. DRIVER AND DIALECT
# These tell Spring how to communicate with MySQL specifically.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================================================================
# HIBERNATE / JPA SETTINGS
# ===================================================================

# This will automatically create your tables (Asset, User, etc.) 
# the first time the app starts.
spring.jpa.hibernate.ddl-auto=update

# Shows the SQL in your console logs for debugging.
spring.jpa.show-sql=true

# ===================================================================
# SERVER SETTINGS
# ===================================================================
# Spring Boot defaults to 8080, which Render expects. 
# We explicitly set it here to be safe.
server.port=8080
