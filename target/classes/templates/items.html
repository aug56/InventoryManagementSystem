<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Items List</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
            --danger-color: #ef4444;
            --success-color: #10b981;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* 🔗 SIDEBAR (Matches Previous Pages) */
        .sidebar {
            width: 240px;
            background-color: #1e293b;
            color: white;
            padding: 2rem 1rem;
            flex-shrink: 0;
        }

        .sidebar h1 {
            font-size: 1.25rem;
            margin-bottom: 2rem;
            padding: 0 1rem;
            color: #38bdf8;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
        }

        .sidebar a:hover {
            background-color: #334155;
            color: white;
        }

        /* MAIN CONTENT AREA */
        .main-content {
            flex-grow: 1;
            padding: 2rem 3rem;
            overflow-x: hidden;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h2 {
            font-size: 1.875rem;
            font-weight: 700;
            margin: 0;
            color: #0f172a;
        }

        /* BUTTONS */
        .add-btn {
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background-color: #1d4ed8;
        }

        /* 📊 TABLE STYLING */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        th {
            background-color: #f1f5f9;
            text-align: left;
            padding: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.875rem;
        }

        tr:hover {
            background-color: #f8fafc;
        }

        /* ACTION LINKS */
        .action-link {
            text-decoration: none;
            font-weight: 600;
        }

        .edit-link { color: var(--primary-color); }
        .delete-link { color: var(--danger-color); }

        .footer-nav {
            margin-top: 2rem;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h1>Inventory Admin</h1>
    <a href="/">Home</a>
    <a href="/items">Items</a>
    <a href="/items/new">Add Item</a>
    <a href="/users">Manage Users</a>
    <a href="/transactions/issue">Issue Asset</a>
    <a href="/transactions/return">Return Asset</a>
    <a href="/transactions/history">View History</a>
</div>

<div class="main-content">
    <div class="header-section">
        <h2>Items List</h2>
        <a href="/items/new" class="add-btn">+ Add Item</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Location</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.id}"></td>
                <td th:text="${item.name}" style="font-weight: 500;"></td>
                <td th:text="${item.category}"></td>
                <td th:text="${item.quantity}"></td>
                <td th:text="${item.location}"></td>
                <td>
                    <a th:href="@{'/items/edit/' + ${item.id}}" class="action-link edit-link">Edit</a> 
                    <span style="color: #cbd5e1; margin: 0 4px;">|</span>
                    <a th:href="@{'/items/delete/' + ${item.id}}" class="action-link delete-link">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="footer-nav">
        <a href="/users" style="color: #64748b; text-decoration: none; font-size: 0.875rem;">&larr; Manage Users</a>
    </div>
</div>

</body>
</html>
