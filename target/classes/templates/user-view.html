<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View User</title>
</head>
<body>

<h2>User Details</h2>

<p><b>ID:</b> <span th:text="${user.id}"></span></p>
<p><b>Name:</b> <span th:text="${user.name}"></span></p>
<p><b>Email:</b> <span th:text="${user.email}"></span></p>
<p><b>Role:</b> <span th:text="${user.role}"></span></p>
<p><b>Status:</b> <span th:text="${user.status}"></span></p>

<br>

<a href="/users">Back to List</a>

</body>
</html>
